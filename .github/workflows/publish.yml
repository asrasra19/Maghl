# .github/workflows/publish.yml

name: Auto Publish
on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"  # تشغيل كل ساعة

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # مفاتيح التخزين اللامركزي
      LIGHTHOUSE_API_KEY: ${{ secrets.LIGHTHOUSE_API_KEY }}
      WEB3STORAGE_TOKEN: ${{ secrets.WEB3STORAGE_TOKEN }}
      NFTSTORAGE_KEY: ${{ secrets.NFTSTORAGE_KEY }}
      FILECOIN_KEY: ${{ secrets.FILECOIN_KEY }}

      # مفاتيح GitHub
      GH_TOKEN: ${{ secrets.GH_TOKEN }}

      # مفاتيح Google Drive
      GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
      GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
      GOOGLE_DRIVE_REFRESH_TOKEN: ${{ secrets.GOOGLE_DRIVE_REFRESH_TOKEN }}

      # مفاتيح منصات التواصل
      TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
      TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
      TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
      FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}

      # البريد الإلكتروني
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}

      # إعدادات الأمان
      ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

      # إعدادات الوضعيات
      MODE: presence   # القيم الممكنة: presence / absence / death

      # إعدادات Rate Limits
      RATE_LIMIT_TWITTER: 5
      RATE_LIMIT_FACEBOOK: 10
      RATE_LIMIT_INSTAGRAM: 8
      RATE_LIMIT_TELEGRAM: 15
      RATE_LIMIT_WHATSAPP: 20

      # إعدادات إعادة المحاولة
      RETRIES: 3
      RETRY_DELAY: 300  # بالثواني

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: